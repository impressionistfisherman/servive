import sys
import asyncio
import platform
import json
from pathlib import Path

async def custom_site():
    import embed
    platform.document.body.style.background = "#12121c"
    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"

    bundle = "servive"
    appdir = Path(f"/data/data/{bundle}")
    appdir.mkdir()

    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("servive.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("servive.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)

    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    if not platform.window.MM.UME:
        __import__(__name__).__file__ = main
        platform.window.infobox.innerText = "화면을 클릭하면 시작됩니다"
        while not platform.window.MM.UME:
            await asyncio.sleep(.1)

    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)
    __import__(__name__).__file__ = main

    def ui_callback(pkg):
        platform.window.infobox.innerText = f"로딩 중..."

    await shell.source(main, callback=ui_callback)

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()

    shell.interactive()

asyncio.run( custom_site() )

    async function custom_onload(debug_hidden) {

    function debug() {
        python.config.debug = true
        custom_onload(false)
        Module.PyRun_SimpleString("shell.uptime()")
        window_resize()
    }

    function info_inline(data){ document.getElementById("info").innerHTML = data }
    function info_online(url) {
        fetch(url).then(r=>r.text()).then(h=>info_inline(h)).catch(e=>console.warn(e));
    }
    function frame_online(url) { window.frames["iframe"].location = url; }

    // Hide the splash background when pygbag hides the infobox
    (function() {
        var splash = document.getElementById('splash-bg');
        var ib = document.getElementById('infobox');
        if (!splash || !ib) return;
        var obs = new MutationObserver(function() {
            if (ib.style.display === 'none') {
                splash.style.display = 'none';
                obs.disconnect();
            }
        });
        obs.observe(ib, { attributes: true, attributeFilter: ['style'] });
    })();

    </script>
