import sys, asyncio, platform, json
from pathlib import Path

async def custom_site():
    import embed
    platform.document.body.style.background = "#12121c"
    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"

    bundle = "servive"
    appdir = Path(f"/data/data/{bundle}")
    appdir.mkdir()

    if platform.window.location.host.find('.itch.zone') > 0:
        import zipfile
        async with platform.fopen("servive.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("sgame_v14.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    platform.run_main(PyConfig, loaderhome=appdir / "assets", loadermain=None)

    while embed.counter() < 0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)
    __import__(__name__).__file__ = main

    def ui_callback(pkg):
        platform.window.infobox.innerText = "\ub85c\ub529 \uc911..."

    await shell.source(main, callback=ui_callback)

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    shell.interactive()

asyncio.run(custom_site())

/* pygbag calls this to show the infobox.
   Colors/font are locked by CSS !important — only set layout here. */
var _ibCorrectText = '화면을 클릭하면 시작됩니다';
function show_infobox() {
    var ib = document.getElementById('infobox');
    if (!ib) return;
    ib.style.display    = 'block';
    ib.style.position   = 'fixed';
    ib.style.left       = '50%';
    ib.style.top        = '50%';
    ib.style.transform  = 'translate(-50%, 110px)';
    ib.style.zIndex     = '9999';
    ib.style.pointerEvents = 'none';
    ib.innerText = _ibCorrectText;
}

    <script type="application/javascript">

    globalThis.__canvas_resized = (self, ecw, ech) => {}

    async function custom_onload(debug_hidden) {
        console.log(__FILE__, "custom_onload")
        pyconsole.hidden = debug_hidden
        system.hidden    = debug_hidden
        transfer.hidden  = debug_hidden
        info.hidden      = debug_hidden
        box.hidden       = debug_hidden

        /* pygbag may have applied inline green/blue styles — override now */
        show_infobox()
    }

    function custom_prerun()  { console.log(__FILE__, "custom_prerun")  }
    function custom_postrun() { console.log(__FILE__, "custom_postrun") }

    function debug() {
        python.config.debug = true
        custom_onload(false)
        Module.PyRun_SimpleString("shell.uptime()")
        window_resize()
    }

    function info_inline(data) { document.getElementById("info").innerHTML = data }
    function info_online(url)  {
        fetch(url).then(r => r.text()).then(h => info_inline(h)).catch(e => console.warn(e))
    }
    function frame_online(url) { window.frames["iframe"].location = url }

    /* Hide splash when pygbag hides the infobox (game started) */
    (function() {
        var splash = document.getElementById('splash-bg')
        var ib     = document.getElementById('infobox')
        if (!splash || !ib) return

        /* Keep infobox text correct whenever anything changes it */
        var _fixing = false
        var textObs = new MutationObserver(function() {
            if (!_fixing && ib.style.display !== 'none' && ib.innerText !== _ibCorrectText) {
                _fixing = true
                ib.innerText = _ibCorrectText
                _fixing = false
            }
        })
        textObs.observe(ib, { childList: true, subtree: true, characterData: true })

        /* Hide splash when pygbag sets infobox to display:none (game started) */
        var obs = new MutationObserver(function() {
            if (ib.style.display === 'none') {
                splash.style.opacity = '0'
                splash.style.pointerEvents = 'none'
                setTimeout(function(){ splash.style.display = 'none' }, 400)
                obs.disconnect()
            }
        })
        obs.observe(ib, { attributes: true, attributeFilter: ['style'] })
    })()

    </script>
